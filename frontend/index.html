                      <span style={{background:u.role==="admin"?"#7c3aed":"#1f2937",
                                    color:u.role==="admin"?"#c4b5fd":"#e2e8f0",
                                    padding:"2px 8px",borderRadius:4,fontSize:12,fontWeight:600}}>
                        {u.role}
                      </span>
                    </td>
                    <td>{u.project_count}</td>
                    <td style={{fontSize:12,color:"#6b7280"}}>{new Date(u.created_at).toLocaleDateString()}</td>
                    <td>
                      <select style={{background:"#111827",border:"1px solid #374151",color:"#e2e8f0",
                                      padding:"4px 8px",borderRadius:6,fontSize:13,cursor:"pointer"}}
                        value={u.role} onChange={e=>updateRole(u.id,e.target.value)}>
                        <option value="user">user</option>
                        <option value="admin">admin</option>
                      </select>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {tab==="projects"&&(
          <div className="card" style={{padding:16}}>
            <table>
              <thead><tr><th>Name</th><th>Owner</th><th>Versions</th><th>Created</th></tr></thead>
              <tbody>
                {projects.map(p=>(
                  <tr key={p.id}>
                    <td style={{fontWeight:600}}>{p.name}</td>
                    <td style={{color:"#9ca3af"}}>{p.owner_name}</td>
                    <td>{p.version_count}</td>
                    <td style={{fontSize:12,color:"#6b7280"}}>{new Date(p.created_at).toLocaleDateString()}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {tab==="activity"&&(
          <div className="card" style={{padding:16}}>
            <table>
              <thead><tr><th>Time</th><th>User</th><th>Project</th><th>Action</th><th>Details</th></tr></thead>
              <tbody>
                {activity.map((a,i)=>(
                  <tr key={i}>
                    <td style={{fontSize:12,color:"#6b7280",whiteSpace:"nowrap"}}>{new Date(a.created_at).toLocaleString()}</td>
                    <td style={{fontWeight:600}}>{a.username||"System"}</td>
                    <td style={{color:"#9ca3af"}}>{a.project_name||"-"}</td>
                    <td><span style={{background:"#111827",padding:"2px 8px",borderRadius:4,fontSize:12}}>{a.action}</span></td>
                    <td style={{color:"#6b7280",fontSize:13,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis"}}>{a.details||"-"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
function App(){
  const [sessionState,setSessionState]=useState(()=>getSession());
  const [view,setView]=useState("dashboard");
  const [currentProject,setCurrentProject]=useState(null);
  const [verifying,setVerifying]=useState(true);

  useEffect(()=>{
    async function verify(){
      const s=getSession();
      if(!s||!s.token||!s.username){clearSession();setSessionState(null);setVerifying(false);return;}
      try{
        const me=await api("GET","/auth/me");
        if(me&&me.username){
          const updated={...s,...me};
          setSession(updated);
          setSessionState(updated);
        } else {
          clearSession();setSessionState(null);
        }
      }catch{clearSession();setSessionState(null);}
      finally{setVerifying(false);}
    }
    verify();
  },[]);

  function handleLogout(){
    clearSession();
    setSessionState(null);
    setView("dashboard");
    setCurrentProject(null);
  }

  function selectProject(p){
    if(p.id==="admin"){setView("admin");return;}
    setCurrentProject(p);setView("project");
  }

  if(verifying){
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f1623"}}>
        <div style={{textAlign:"center"}}>
          <span className="spinner" style={{width:48,height:48}}/>
          <p style={{color:"#6b7280",marginTop:16}}>Verifying session...</p>
        </div>
      </div>
    );
  }

  if(!sessionState||!sessionState.token){
    return <AuthPage onLogin={d=>{setSession(d);setSessionState(d);setView("dashboard");}}/>;
  }

  if(view==="admin") return <AdminPanel user={sessionState} onBack={()=>setView("dashboard")}/>;
  if(view==="project"&&currentProject) return <ProjectView project={currentProject} user={sessionState} onBack={()=>setView("dashboard")}/>;
  return <Dashboard user={sessionState} onSelectProject={selectProject} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
const loader = document.getElementById('init-loader');
if(loader) loader.style.display='none';
</script>
</body>
</html>
